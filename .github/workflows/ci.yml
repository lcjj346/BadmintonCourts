name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A force-push or quick follow-up commit cancels the superseded PR run instead of
# burning minutes on a stale commit. Runs on main are never cancelled — the
# migrate-production job must not be killed mid-deploy.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Both jobs need a throwaway Postgres. Service tests hit a real database, and
# they wipe/seed rows, so each job gets its own isolated instance.
env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/badmintonsg
  DIRECT_URL: postgresql://postgres:postgres@localhost:5432/badmintonsg
  IP_HASH_SALT: ci-test-salt

jobs:
  test:
    name: Lint · typecheck · unit tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: badmintonsg
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Apply migrations
        run: npx prisma migrate deploy
      - name: Seed venues
        run: npx prisma db seed
      # Explicit lint step — today lint also runs implicitly inside `next build`,
      # but Next is moving away from that; this keeps lint enforced regardless.
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit + integration tests
        run: npm test
      # No build here — the e2e job production-builds this same commit anyway,
      # and typecheck already catches what a second build would.

  e2e:
    name: Playwright E2E (core loop)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: badmintonsg
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Apply migrations
        run: npx prisma migrate deploy
      - name: Seed venues
        run: npx prisma db seed
      # Chromium is ~150MB per run — cache it keyed on the Playwright version, since
      # each Playwright release pins its own browser build.
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -e "console.log(require('@playwright/test/package.json').version)")" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browser
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      # Cache hit skips the download, but the runner's OS-level deps still need installing.
      - name: Install Playwright OS deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - name: Production build
        run: npm run build
      - name: Run E2E
        run: npm run test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  migrate-production:
    name: Deploy migrations to production
    runs-on: ubuntu-latest
    needs: [test, e2e]
    # Only after a real merge to main — never on a PR, which must not touch prod.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      # The `vercel-build` script (which Vercel prefers over `build` when present)
      # runs `prisma migrate deploy` before `next build`, so Vercel's own build is
      # the primary, atomic place migrations actually apply — no race between this
      # job and Vercel's independent deploy. A plain local `npm run build` stays
      # pure (no DB writes). This step is a defensive backup only (e.g. Vercel
      # build skipped/disabled) — safe to run twice since migrate deploy is
      # idempotent.
      # Overrides the throwaway-Postgres DATABASE_URL/DIRECT_URL set at workflow level above —
      # this is the one job in this file that's meant to touch the real database.
      - name: Apply migrations to production
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.PROD_DIRECT_URL }}
      - name: Reseed venues in production
        run: npx prisma db seed
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.PROD_DIRECT_URL }}
